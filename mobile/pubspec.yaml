name: xarid
description: "Xarid - grocery delivery (customer app)"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.6
  # Phase 3: live tracking + courier
  flutter_map: ^7.0.2 # OpenStreetMap tiles, no API key
  latlong2: ^0.9.1
  geolocator: ^12.0.0 # courier GPS stream
  url_launcher: ^6.3.0 # call customer / open in maps

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
